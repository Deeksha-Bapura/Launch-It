kind = "web"
previewPath = "/"
title = "LaunchIt"
version = "1.0.0"
id = "artifacts/launchit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23008

[services.development]
run = "pnpm --filter @workspace/launchit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launchit", "run", "build" ]
publicDir = "artifacts/launchit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23008"
BASE_PATH = "/"
